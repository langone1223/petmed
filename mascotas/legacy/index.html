<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Plataforma Premium</title>
    <meta name="description" content="Accede a tu cuenta de usuario con nuestro portal de inicio de sesión seguro.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="card-header">
                <h2>Bienvenido de nuevo</h2>
                <p>Por favor, ingresa tus credenciales</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class='bx bx-envelope'></i>
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Correo electrónico</label>
                </div>
                
                <div class="input-group">
                    <i class='bx bx-lock-alt'></i>
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Contraseña</label>
                    <i class='bx bx-hide toggle-password' id="togglePassword"></i>
                </div>
                
                <div class="form-actions">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Iniciar Sesión</span>
                    <i class='bx bx-loader-alt bx-spin loader-icon' style="display: none;"></i>
                </button>
            </form>
            
            <div class="card-footer">
                <p>¿No tienes una cuenta? <a href="#">Regístrate aquí</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
